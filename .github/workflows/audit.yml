name: Elara Audit
on: [pull_request]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm i -D @playwright/test@1.46.1 @shopify/theme-check@2 lhci@0.12.0
      - run: npx playwright install --with-deps
      - run: npx theme-check --fail-level suggestion || true
      - name: Snapshots
        run: node .github/scripts/snapshots.js
        env:
          STORE_URL: ${{ secrets.STORE_URL }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          PREVIEW_ID: ${{ secrets.PREVIEW_ID }}
      - name: Lighthouse
        run: npx lhci autorun --config=.github/lhci.json
        env:
          STORE_URL: ${{ secrets.STORE_URL }}
          PREVIEW_ID: ${{ secrets.PREVIEW_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: elara-audit
          path: |
            .lighthouseci/**
            artifacts/**
